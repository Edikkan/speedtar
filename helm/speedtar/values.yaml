# Speedtar E-commerce Helm Chart Values

# Global settings
global:
  domain: hitension.live
  environment: production

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: edikkan/speedtar-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    host: shop.hitension.live
    tls: true
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      cert-manager.io/cluster-issuer: letsencrypt-prod
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    NEXT_PUBLIC_API_URL: "https://api.hitension.live/api/v1"

# Backend configuration
backend:
  enabled: true
  replicaCount: 2
  image:
    repository: edikkan/speedtar-backend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 5000
  ingress:
    enabled: true
    host: api.hitension.live
    tls: true
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      cert-manager.io/cluster-issuer: letsencrypt-prod
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    NODE_ENV: "production"
    PORT: "5000"
    API_URL: "https://api.hitension.live"
    FRONTEND_URL: "https://shop.hitension.live"
    JWT_EXPIRES_IN: "7d"

# Database configuration (using Bitnami PostgreSQL)
postgresql:
  enabled: true
  auth:
    username: speedtar
    password: ""
    database: speedtar
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# Redis configuration (using Bitnami Redis)
redis:
  enabled: true
  auth:
    enabled: true
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: ""
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"

# Secrets configuration
secrets:
  jwtSecret: "change-me-jwt-secret"
  stripeSecretKey: ""
  stripeWebhookSecret: ""
  smtpPassword: ""

# Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: false
  prometheusRule:
    enabled: false

# Network policies
networkPolicy:
  enabled: false

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
