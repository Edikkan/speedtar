apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: speedtar

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production
  app.kubernetes.io/version: "1.0.0"

images:
  - name: edikkan/speedtar-frontend
    newTag: latest
  - name: edikkan/speedtar-backend
    newTag: latest

replicas:
  - name: frontend
    count: 3
  - name: backend
    count: 3

patchesStrategicMerge:
  - configmap-patch.yaml

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
