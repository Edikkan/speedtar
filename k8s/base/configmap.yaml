apiVersion: v1
kind: ConfigMap
metadata:
  name: speedtar-config
  namespace: speedtar
data:
  # Frontend Config
  NEXT_PUBLIC_API_URL: "https://api.hitension.live/api/v1"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_your_stripe_key"
  
  # Backend Config
  NODE_ENV: "production"
  PORT: "5000"
  API_URL: "https://api.hitension.live"
  FRONTEND_URL: "https://shop.hitension.live"
  JWT_EXPIRES_IN: "7d"
  
  # Database Config
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "speedtar"
  
  # Redis Config
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  
  # Rate Limiting
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
