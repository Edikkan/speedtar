apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: speedtar

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - postgres.yaml
  - redis.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: speedtar
  app.kubernetes.io/managed-by: kustomize
