apiVersion: v1
kind: Secret
metadata:
  name: speedtar-secrets
  namespace: speedtar
type: Opaque
stringData:
  # Database
  DB_USER: "speedtar_user"
  DB_PASSWORD: "change_me_secure_password"
  DATABASE_URL: "postgresql://speedtar_user:change_me_secure_password@postgres:5432/speedtar"
  
  # JWT
  JWT_SECRET: "change_me_jwt_secret_key_min_32_chars_long"
  
  # Redis
  REDIS_PASSWORD: "change_me_redis_password"
  
  # Stripe
  STRIPE_SECRET_KEY: "sk_test_your_stripe_secret_key"
  STRIPE_WEBHOOK_SECRET: "whsec_your_webhook_secret"
  
  # Email (SMTP)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "your_email@gmail.com"
  SMTP_PASS: "your_app_password"
  
  # Admin
  ADMIN_EMAIL: "admin@speedtar.com"
  ADMIN_PASSWORD: "change_me_admin_password"
---
