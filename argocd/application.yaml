apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: speedtar
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: speedtar
    app.kubernetes.io/part-of: speedtar-platform
spec:
  project: default
  source:
    repoURL: https://github.com/edikkan/speedtar.git
    targetRevision: HEAD
    path: k8s/overlays/production
    kustomize:
      images:
        - edikkan/speedtar-frontend:latest
        - edikkan/speedtar-backend:latest
  destination:
    server: https://kubernetes.default.svc
    namespace: speedtar
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
