apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: speedtar-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/edikkan/speedtar.git
    targetRevision: HEAD
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Project definition for Speedtar
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: speedtar
  namespace: argocd
spec:
  description: Speedtar E-commerce Platform
  sourceRepos:
    - https://github.com/edikkan/speedtar.git
  destinations:
    - namespace: speedtar
      server: https://kubernetes.default.svc
    - namespace: speedtar-staging
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: 'apps'
      kind: StatefulSet
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: PersistentVolumeClaim
    - group: 'networking.k8s.io'
      kind: Ingress
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
    - group: 'traefik.containo.us'
      kind: Middleware
  orphanedResources:
    warn: true
